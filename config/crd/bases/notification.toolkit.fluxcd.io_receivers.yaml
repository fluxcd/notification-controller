---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.21.0
  name: receivers.notification.toolkit.fluxcd.io
spec:
  group: notification.toolkit.fluxcd.io
  names:
    categories:
    - all
    - fluxcd
    - fluxcd-notifications
    kind: Receiver
    listKind: ReceiverList
    plural: receivers
    singular: receiver
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - jsonPath: .status.conditions[?(@.type=="Ready")].status
      name: Ready
      type: string
    - jsonPath: .status.conditions[?(@.type=="Ready")].message
      name: Status
      type: string
    name: v1
    schema:
      openAPIV3Schema:
        description: Receiver is the Schema for the receivers API.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: ReceiverSpec defines the desired state of the Receiver.
            properties:
              events:
                description: |-
                  Events specifies the list of event types to handle,
                  e.g. 'push' for GitHub or 'Push Hook' for GitLab.
                items:
                  type: string
                type: array
              interval:
                default: 10m
                description: Interval at which to reconcile the Receiver with its
                  Secret references.
                pattern: ^([0-9]+(\.[0-9]+)?(ms|s|m|h))+$
                type: string
              oidcProviders:
                description: |-
                  OIDCProviders specifies the OIDC providers used to authenticate incoming
                  requests when Type is 'generic-oidc'. The provider whose IssuerURL matches
                  the token's 'iss' claim is used to verify the token signature, expiration
                  and audience, and to evaluate the configured CEL validations against the
                  token claims.
                items:
                  description: |-
                    OIDCProvider configures an OIDC issuer used to authenticate requests for a
                    'generic-oidc' Receiver.
                  properties:
                    audience:
                      description: |-
                        Audience is the expected audience ('aud' claim) for tokens issued by
                        this provider. Defaults to 'notification-controller'.
                      type: string
                    issuerURL:
                      description: |-
                        IssuerURL is the OIDC issuer URL used for provider discovery. It must
                        match the 'iss' claim of tokens issued by this provider.
                      pattern: ^https?://
                      type: string
                    validations:
                      description: |-
                        Validations is the list of CEL boolean expressions evaluated against the
                        token claims and the variables. The request is accepted only if all of
                        them evaluate to true; the message of each failing expression is returned
                        to the caller.

                        At least one validation is required. A valid signature alone does not
                        authorize a request: public issuers issue tokens to any caller on the
                        platform, so the validations must constrain the caller's identity claims
                        (e.g. 'repository_owner' for GitHub Actions).
                      items:
                        description: |-
                          OIDCValidation is a CEL boolean expression evaluated against the OIDC token
                          claims and variables of a 'generic-oidc' Receiver.
                        properties:
                          expression:
                            description: Expression is the CEL boolean expression
                              to evaluate.
                            type: string
                          message:
                            description: Message is returned to the caller when the
                              expression evaluates to false.
                            type: string
                        required:
                        - expression
                        - message
                        type: object
                      minItems: 1
                      type: array
                    variables:
                      description: |-
                        Variables is an optional list of named CEL expressions, evaluated in order
                        and exposed as 'vars.<name>'. Each expression can read the token claims
                        via 'claims' and any variable defined before it. Use it to share
                        sub-expressions across validations.
                      items:
                        description: |-
                          OIDCVariable is a named CEL expression evaluated against the OIDC token
                          claims of a 'generic-oidc' Receiver.
                        properties:
                          expression:
                            description: Expression is the CEL expression that defines
                              the variable value.
                            type: string
                          name:
                            description: Name is the variable name; it must be a valid
                              CEL identifier.
                            type: string
                        required:
                        - expression
                        - name
                        type: object
                      type: array
                  required:
                  - issuerURL
                  - validations
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - issuerURL
                x-kubernetes-list-type: map
              resourceFilter:
                description: |-
                  ResourceFilter is a CEL expression expected to return a boolean that is
                  evaluated for each resource referenced in the Resources field when a
                  webhook is received. If the expression returns false then the controller
                  will not request a reconciliation for the resource.
                  The expression can read the resource metadata via 'res' and the webhook
                  request body via 'req'. For generic-oidc receivers, the verified OIDC
                  token claims are also available via 'claims'.
                  When the expression is specified the controller will parse it and mark
                  the object as terminally failed if the expression is invalid or does not
                  return a boolean.
                type: string
              resources:
                description: A list of resources to be notified about changes.
                items:
                  description: |-
                    ReceiverResource references a resource to be notified about changes, with an
                    optional per-resource CEL filter.
                  properties:
                    apiVersion:
                      description: API version of the referent
                      type: string
                    filter:
                      description: |-
                        Filter is a CEL expression expected to return a boolean that is evaluated
                        for each resource matched by this reference when a webhook is received,
                        in addition to the top-level resourceFilter. A reconciliation is requested
                        only when both expressions (when set) return true.
                        The expression can read the resource metadata via 'res' and the webhook
                        request body via 'req'. For generic-oidc receivers, the verified OIDC
                        token claims are also available via 'claims'.
                        When the expression is specified the controller will parse it and mark
                        the object as terminally failed if the expression is invalid or does not
                        return a boolean.
                      type: string
                    kind:
                      description: Kind of the referent
                      enum:
                      - Bucket
                      - GitRepository
                      - Kustomization
                      - HelmRelease
                      - HelmChart
                      - HelmRepository
                      - ImageRepository
                      - ImagePolicy
                      - ImageUpdateAutomation
                      - OCIRepository
                      - ArtifactGenerator
                      - ExternalArtifact
                      type: string
                    matchLabels:
                      additionalProperties:
                        type: string
                      description: |-
                        MatchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                        map is equivalent to an element of matchExpressions, whose key field is "key", the
                        operator is "In", and the values array contains only "value". The requirements are ANDed.
                        MatchLabels requires the name to be set to `*`.
                      type: object
                    name:
                      description: |-
                        Name of the referent
                        If multiple resources are targeted `*` may be set.
                      maxLength: 253
                      minLength: 1
                      type: string
                    namespace:
                      description: Namespace of the referent
                      maxLength: 253
                      minLength: 1
                      type: string
                  required:
                  - kind
                  - name
                  type: object
                type: array
              secretRef:
                description: |-
                  SecretRef specifies the Secret containing the token used
                  to validate the payload authenticity. The Secret must contain a 'token'
                  key. For GCR receivers, the Secret must also contain an 'email' key
                  with the IAM service account email configured on the Pub/Sub push
                  subscription, and an 'audience' key with the expected OIDC token audience.

                  Required for all receiver types except 'generic-oidc', which authenticates
                  requests using the OIDC token instead and must not set this field.
                properties:
                  name:
                    description: Name of the referent.
                    type: string
                required:
                - name
                type: object
              suspend:
                description: |-
                  Suspend tells the controller to suspend subsequent
                  events handling for this receiver.
                type: boolean
              type:
                description: |-
                  Type of webhook sender, used to determine
                  the validation procedure and payload deserialization.
                enum:
                - generic
                - generic-hmac
                - generic-oidc
                - github
                - gitlab
                - bitbucket
                - harbor
                - dockerhub
                - quay
                - gcr
                - nexus
                - acr
                - cdevents
                type: string
            required:
            - resources
            - type
            type: object
            x-kubernetes-validations:
            - message: generic-oidc receivers must define at least one oidcProvider
              rule: self.type != 'generic-oidc' || (has(self.oidcProviders) && size(self.oidcProviders)
                > 0)
            - message: oidcProviders can only be set when type is generic-oidc
              rule: self.type == 'generic-oidc' || !has(self.oidcProviders) || size(self.oidcProviders)
                == 0
            - message: secretRef cannot be set when type is generic-oidc
              rule: self.type != 'generic-oidc' || !has(self.secretRef)
            - message: secretRef is required when type is not generic-oidc
              rule: self.type == 'generic-oidc' || has(self.secretRef)
          status:
            default:
              observedGeneration: -1
            description: ReceiverStatus defines the observed state of the Receiver.
            properties:
              conditions:
                description: Conditions holds the conditions for the Receiver.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastHandledReconcileAt:
                description: |-
                  LastHandledReconcileAt holds the value of the most recent
                  reconcile request value, so a change of the annotation value
                  can be detected.
                type: string
              observedGeneration:
                description: ObservedGeneration is the last observed generation of
                  the Receiver object.
                format: int64
                type: integer
              webhookPath:
                description: |-
                  WebhookPath is the generated incoming webhook address in the format
                  of '/hook/sha256sum(token+name+namespace)'.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
